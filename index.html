<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mada AI - مولد الصور</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: 'Arial', sans-serif; min-height: 100vh; }
  header { border-bottom: 1px solid #1a1a1a; padding: 20px 30px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 1.8em; color: #ff2222; letter-spacing: 3px; text-shadow: 0 0 15px rgba(255,0,0,0.5); }
  .user-area { display: flex; align-items: center; gap: 10px; }
  .user-area img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #ff2222; }
  .login-btn { background: #ff2222; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.9em; font-weight: bold; }
  .logout-btn { background: transparent; color: #ff2222; border: 1px solid #ff2222; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85em; }
  .hero { text-align: center; padding: 60px 20px 40px; background: radial-gradient(ellipse at top, #1a0000 0%, #000 60%); }
  .hero h2 { font-size: 2.2em; margin-bottom: 15px; background: linear-gradient(90deg, #ff2222, #ff6666, #ff2222); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .hero p { color: #888; font-size: 1em; max-width: 500px; margin: 0 auto; line-height: 1.6; }
  .main { max-width: 700px; margin: 0 auto; padding: 40px 20px; }
  .login-prompt { text-align: center; padding: 60px 20px; }
  .login-prompt p { color: #888; margin-bottom: 20px; font-size: 1.1em; }
  .google-btn { display: flex; align-items: center; gap: 12px; background: white; color: #333; border: none; padding: 14px 24px; border-radius: 12px; cursor: pointer; font-size: 1em; font-weight: bold; margin: 0 auto; }
  .google-btn img { width: 24px; }
  .input-card { background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 16px; padding: 24px; margin-bottom: 20px; }
  .input-card label { display: block; color: #ff4444; font-size: 0.9em; margin-bottom: 10px; font-weight: bold; letter-spacing: 1px; }
  textarea { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #111; color: #fff; font-size: 1em; resize: none; height: 110px; outline: none; transition: border 0.3s; line-height: 1.6; }
  textarea:focus { border-color: #ff2222; }
  textarea::placeholder { color: #444; }
  .styles { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
  .style-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid #333; background: #111; color: #888; font-size: 0.85em; cursor: pointer; transition: all 0.3s; }
  .style-btn:hover, .style-btn.active { border-color: #ff2222; color: #ff2222; background: rgba(255,34,34,0.1); }
  .translate-hint { color: #555; font-size: 0.8em; margin-top: 8px; }
  .gen-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #ff2222, #cc0000); border: none; border-radius: 12px; color: white; font-size: 1.15em; font-weight: bold; cursor: pointer; transition: all 0.3s; letter-spacing: 1px; box-shadow: 0 4px 20px rgba(255,0,0,0.3); }
  .gen-btn:hover { transform: translateY(-2px); }
  .gen-btn:disabled { background: #330000; box-shadow: none; transform: none; cursor: not-allowed; }
  .loading { display: none; text-align: center; padding: 40px; }
  .spinner { width: 50px; height: 50px; border: 3px solid #1a1a1a; border-top: 3px solid #ff2222; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { color: #888; }
  .result-card { display: none; background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 16px; overflow: hidden; margin-top: 20px; }
  .result-card img { width: 100%; display: block; }
  .result-actions { padding: 16px 20px; border-top: 1px solid #1a1a1a; }
  .download-btn { width: 100%; padding: 12px; background: transparent; border: 1px solid #ff2222; border-radius: 10px; color: #ff2222; font-size: 0.95em; cursor: pointer; font-weight: bold; transition: all 0.3s; }
  .download-btn:hover { background: rgba(255,34,34,0.1); }
  #status { text-align: center; padding: 15px; font-size: 0.95em; color: #ff4444; }
  footer { text-align: center; padding: 30px; color: #333; font-size: 0.85em; border-top: 1px solid #111; margin-top: 60px; }
  footer span { color: #ff2222; }
</style>
</head>
<body>

<header>
  <h1>MADA AI</h1>
  <div class="user-area" id="userArea">
    <button class="login-btn" onclick="loginWithGoogle()">تسجيل الدخول بـ Google</button>
  </div>
</header>

<div class="hero">
  <h2>ولّد صورك بالذكاء الاصطناعي</h2>
  <p>اكتب أي وصف تخيله بالعربي أو الإنجليزي وسيقوم الذكاء الاصطناعي بتحويله لصورة احترافية</p>
</div>

<div class="main">
  <div id="loginPrompt" class="login-prompt">
    <p>سجّل دخولك عشان تبدأ تولّد صور!</p>
    <button class="google-btn" onclick="loginWithGoogle()">
      <img src="https://www.google.com/favicon.ico" alt="Google">
      تسجيل الدخول بـ Google
    </button>
  </div>

  <div id="appContent" style="display:none">
    <div class="input-card">
      <label>✦ اكتب وصف الصورة بالعربي أو الإنجليزي</label>
      <textarea id="prompt" placeholder="مثال: رجل عربي وسيم بعيون بنية وشعر أسود..."></textarea>
      <p class="translate-hint">🌐 سيتم ترجمة النص العربي تلقائياً</p>
      <div class="styles">
        <button class="style-btn active" onclick="setStyle(this, '')">عادي</button>
        <button class="style-btn" onclick="setStyle(this, ', realistic photography, 4k, highly detailed')">واقعي</button>
        <button class="style-btn" onclick="setStyle(this, ', digital art, highly detailed, vibrant')">فن رقمي</button>
        <button class="style-btn" onclick="setStyle(this, ', anime style, vibrant colors, detailed')">أنمي</button>
        <button class="style-btn" onclick="setStyle(this, ', oil painting, artistic, masterpiece')">لوحة فنية</button>
      </div>
    </div>
    <button class="gen-btn" onclick="generateImage()" id="btn">🎨 ولّد الصورة الآن</button>
    <div id="status"></div>
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p id="loadingText">جاري توليد صورتك... لحظة من فضلك</p>
    </div>
    <div class="result-card" id="resultCard">
      <img id="resultImg" src="" alt="صورة مولدة">
      <div class="result-actions">
        <button class="download-btn" onclick="downloadImage()">⬇️ تحميل الصورة</button>
      </div>
    </div>
  </div>
</div>

<footer>
  صُنع بـ <span>♥</span> بواسطة <span>Mada AI</span> — مدعوم بالذكاء الاصطناعي
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBULzTuOblQH2Mm0UHkNMdi7Y2b-D_cEpc",
  authDomain: "mada-ai-c663e.firebaseapp.com",
  projectId: "mada-ai-c663e",
  storageBucket: "mada-ai-c663e.firebasestorage.app",
  messagingSenderId: "794817986133",
  appId: "1:794817986133:web:ee580a2018bb4ea5609edc",
  measurementId: "G-RBJL70LCYE"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let styleExtra = '';
let currentImageUrl = '';

function isArabic(text) {
  return /[\u0600-\u06FF]/.test(text);
}

async function translateToEnglish(text) {
  try {
    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=ar|en`);
    const data = await res.json();
    return data.responseData.translatedText || text;
  } catch(e) {
    return text;
  }
}

window.loginWithGoogle = async function() {
  try {
    await signInWithPopup(auth, provider);
  } catch(e) {
    alert("حصل خطأ في تسجيل الدخول!");
  }
}

window.logoutUser = async function() {
  await signOut(auth);
}

window.setStyle = function(btn, style) {
  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  styleExtra = style;
}

window.downloadImage = function() {
  const a = document.createElement("a");
  a.href = currentImageUrl;
  a.download = "mada-ai.png";
  a.click();
}

window.generateImage = async function() {
  const promptText = document.getElementById("prompt").value.trim();
  if (!promptText) { alert("من فضلك اكتب وصف الصورة!"); return; }

  const btn = document.getElementById("btn");
  const status = document.getElementById("status");
  const loading = document.getElementById("loading");
  const loadingText = document.getElementById("loadingText");
  const resultCard = document.getElementById("resultCard");
  const resultImg = document.getElementById("resultImg");

  btn.disabled = true;
  btn.textContent = "⏳ جاري التوليد...";
  status.textContent = "";
  loading.style.display = "block";
  resultCard.style.display = "none";

  let finalPrompt = promptText;

  if (isArabic(promptText)) {
    loadingText.textContent = "جاري ترجمة النص...";
    finalPrompt = await translateToEnglish(promptText);
    loadingText.textContent = "جاري توليد صورتك... لحظة من فضلك";
  }

  const seed = Math.floor(Math.random() * 1000000);
  const fullPrompt = encodeURIComponent(finalPrompt + styleExtra + ", highly detailed, sharp focus, 8k, masterpiece");
  const imageUrl = `https://image.pollinations.ai/prompt/${fullPrompt}?seed=${seed}&width=1024&height=1024&model=flux&nologo=true&enhance=true`;

  const img = new Image();
  img.onload = function() {
    currentImageUrl = imageUrl;
    resultImg.src = imageUrl;
    resultCard.style.display = "block";
    status.textContent = "✅ تم توليد الصورة بنجاح!";
    loading.style.display = "none";
    btn.disabled = false;
    btn.textContent = "🎨 ولّد الصورة الآن";
  };
  img.onerror = function() {
    status.textContent = "⚠️ حاول مرة أخرى!";
    loading.style.display = "none";
    btn.disabled = false;
    btn.textContent = "🎨 ولّد الصورة الآن";
  };
  img.src = imageUrl;
}

onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("loginPrompt").style.display = "none";
    document.getElementById("appContent").style.display = "block";
    document.getElementById("userArea").innerHTML = `
      <img src="${user.photoURL}" alt="صورة المستخدم">
      <span style="color:#aaa;font-size:0.85em">${user.displayName}</span>
      <button class="logout-btn" onclick="logoutUser()">خروج</button>
    `;
  } else {
    document.getElementById("loginPrompt").style.display = "block";
    document.getElementById("appContent").style.display = "none";
    document.getElementById("userArea").innerHTML = `
      <button class="login-btn" onclick="loginWithGoogle()">تسجيل الدخول بـ Google</button>
    `;
  }
});
</script>
</body>
</html>
