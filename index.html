<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Madnis AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
  }
  h1 {
    font-size: 2.8em;
    color: #ff2222;
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: 2px;
    text-shadow: 0 0 20px #ff0000;
  }
  .sub {
    color: #888;
    margin-bottom: 40px;
    font-size: 1em;
    text-align: center;
  }
  .input-area {
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  textarea {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: 2px solid #ff2222;
    background: #111;
    color: #fff;
    font-size: 1em;
    resize: none;
    height: 100px;
    outline: none;
  }
  textarea::placeholder { color: #555; }
  button.gen {
    padding: 15px;
    background: #ff2222;
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 1.1em;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }
  button.gen:hover { background: #cc0000; }
  button.gen:disabled { background: #550000; cursor: not-allowed; }
  #status {
    margin-top: 20px;
    color: #ff4444;
    font-size: 1em;
    text-align: center;
  }
  #result {
    margin-top: 25px;
    width: 100%;
    max-width: 600px;
    text-align: center;
  }
  #result img {
    width: 100%;
    border-radius: 16px;
    border: 2px solid #ff2222;
    box-shadow: 0 0 30px rgba(255,0,0,0.3);
  }
  .download-btn {
    display: none;
    margin-top: 15px;
    padding: 12px;
    background: #111;
    border: 2px solid #ff2222;
    border-radius: 12px;
    color: #ff2222;
    font-size: 1em;
    cursor: pointer;
    width: 100%;
    font-weight: bold;
  }
</style>
</head>
<body>

<h1>Madnis AI</h1>
<p class="sub">اكتب أي وصف وهنولدلك صورة بالذكاء الاصطناعي</p>

<div class="input-area">
  <textarea id="prompt" placeholder="مثال: رجل يمشي في مدينة مستقبلية ليلاً..."></textarea>
  <button class="gen" onclick="generateImage()" id="btn">🎨 ولّد الصورة</button>
</div>

<div id="status"></div>
<div id="result"></div>
<button class="download-btn" id="downloadBtn">⬇️ تحميل الصورة</button>

<script>
const TOKEN = "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";

async function generateImage() {
  const prompt = document.getElementById("prompt").value.trim();
  if (!prompt) { alert("اكتب وصف الصورة الأول!"); return; }

  const btn = document.getElementById("btn");
  const status = document.getElementById("status");
  const result = document.getElementById("result");
  const downloadBtn = document.getElementById("downloadBtn");

  btn.disabled = true;
  btn.textContent = "⏳ جاري التوليد...";
  status.textContent = "بيتم توليد الصورة، استنى شوية...";
  result.innerHTML = "";
  downloadBtn.style.display = "none";

  try {
    const response = await fetch(
      "https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-2-1",
      {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${TOKEN}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ inputs: prompt })
      }
    );

    if (!response.ok) throw new Error("خطأ");

    const blob = await response.blob();
    const url = URL.createObjectURL(blob);

    result.innerHTML = `<img src="${url}" alt="صورة">`;
    status.textContent = "✅ تم توليد الصورة!";

    downloadBtn.style.display = "block";
    downloadBtn.onclick = () => {
      const a = document.createElement("a");
      a.href = url;
      a.download = "madnis-ai.png";
      a.click();
    };
  } catch (err) {
    status.textContent = "❌ حدث خطأ، حاول تاني بعد شوية!";
  }

  btn.disabled = false;
  btn.textContent = "🎨 ولّد الصورة";
}
</script>
</body>
</html>
