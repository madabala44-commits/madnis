<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Madnis AI - مولد الصور</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #fff;
    font-family: 'Arial', sans-serif;
    min-height: 100vh;
  }
  header {
    border-bottom: 1px solid #1a1a1a;
    padding: 20px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #000;
  }
  header h1 {
    font-size: 1.8em;
    color: #ff2222;
    letter-spacing: 3px;
    text-shadow: 0 0 15px rgba(255,0,0,0.5);
  }
  header span {
    background: #ff2222;
    color: white;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75em;
    font-weight: bold;
  }
  .hero {
    text-align: center;
    padding: 60px 20px 40px;
    background: radial-gradient(ellipse at top, #1a0000 0%, #000 60%);
  }
  .hero h2 {
    font-size: 2.5em;
    margin-bottom: 15px;
    background: linear-gradient(90deg, #ff2222, #ff6666, #ff2222);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero p {
    color: #888;
    font-size: 1.1em;
    max-width: 500px;
    margin: 0 auto;
    line-height: 1.6;
  }
  .main {
    max-width: 700px;
    margin: 0 auto;
    padding: 40px 20px;
  }
  .input-card {
    background: #0d0d0d;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .input-card label {
    display: block;
    color: #ff4444;
    font-size: 0.9em;
    margin-bottom: 10px;
    font-weight: bold;
    letter-spacing: 1px;
  }
  textarea {
    width: 100%;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #333;
    background: #111;
    color: #fff;
    font-size: 1em;
    resize: none;
    height: 110px;
    outline: none;
    transition: border 0.3s;
    line-height: 1.6;
  }
  textarea:focus { border-color: #ff2222; }
  textarea::placeholder { color: #444; }
  .styles {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 15px;
  }
  .style-btn {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid #333;
    background: #111;
    color: #888;
    font-size: 0.85em;
    cursor: pointer;
    transition: all 0.3s;
  }
  .style-btn:hover, .style-btn.active {
    border-color: #ff2222;
    color: #ff2222;
    background: rgba(255,34,34,0.1);
  }
  .gen-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #ff2222, #cc0000);
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 1.15em;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 1px;
    box-shadow: 0 4px 20px rgba(255,0,0,0.3);
  }
  .gen-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(255,0,0,0.4); }
  .gen-btn:disabled { background: #330000; box-shadow: none; transform: none; cursor: not-allowed; }
  .loading {
    display: none;
    text-align: center;
    padding: 40px;
  }
  .spinner {
    width: 50px;
    height: 50px;
    border: 3px solid #1a1a1a;
    border-top: 3px solid #ff2222;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { color: #888; font-size: 0.95em; }
  .result-card {
    display: none;
    background: #0d0d0d;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    overflow: hidden;
    margin-top: 20px;
  }
  .result-card img { width: 100%; display: block; }
  .result-actions {
    padding: 16px 20px;
    display: flex;
    gap: 10px;
    border-top: 1px solid #1a1a1a;
  }
  .download-btn {
    flex: 1;
    padding: 12px;
    background: transparent;
    border: 1px solid #ff2222;
    border-radius: 10px;
    color: #ff2222;
    font-size: 0.95em;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s;
  }
  .download-btn:hover { background: rgba(255,34,34,0.1); }
  #status {
    text-align: center;
    padding: 15px;
    font-size: 0.95em;
    color: #ff4444;
  }
  footer {
    text-align: center;
    padding: 30px;
    color: #333;
    font-size: 0.85em;
    border-top: 1px solid #111;
    margin-top: 60px;
  }
  footer span { color: #ff2222; }
</style>
</head>
<body>

<header>
  <h1>MADNIS AI</h1>
  <span>BETA</span>
</header>

<div class="hero">
  <h2>ولّد صورك بالذكاء الاصطناعي</h2>
  <p>اكتب أي وصف تخيله وسيقوم الذكاء الاصطناعي بتحويله لصورة احترافية في ثوانٍ</p>
</div>

<div class="main">
  <div class="input-card">
    <label>✦ اكتب وصف الصورة بالإنجليزي</label>
    <textarea id="prompt" placeholder="Example: Egyptian man, handsome face, realistic, 8k..."></textarea>
    <div class="styles">
      <button class="style-btn active" onclick="setStyle(this, '')">عادي</button>
      <button class="style-btn" onclick="setStyle(this, ', realistic photography, 4k, highly detailed')">واقعي</button>
      <button class="style-btn" onclick="setStyle(this, ', digital art, highly detailed, vibrant')">فن رقمي</button>
      <button class="style-btn" onclick="setStyle(this, ', anime style, vibrant colors, detailed')">أنمي</button>
      <button class="style-btn" onclick="setStyle(this, ', oil painting, artistic, masterpiece')">لوحة فنية</button>
    </div>
  </div>

  <button class="gen-btn" onclick="generateImage()" id="btn">🎨 ولّد الصورة الآن</button>

  <div id="status"></div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>جاري توليد صورتك بجودة عالية... قد يستغرق 30-60 ثانية</p>
  </div>

  <div class="result-card" id="resultCard">
    <img id="resultImg" src="" alt="صورة مولدة">
    <div class="result-actions">
      <button class="download-btn" onclick="downloadImage()">⬇️ تحميل الصورة</button>
    </div>
  </div>
</div>

<footer>
  صُنع بـ <span>♥</span> بواسطة <span>Madnis AI</span> — مدعوم بالذكاء الاصطناعي
</footer>

<script>
let styleExtra = '';
let currentBlob = null;

function setStyle(btn, style) {
  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  styleExtra = style;
}

function downloadImage() {
  if (!currentBlob) return;
  const url = URL.createObjectURL(currentBlob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "madnis-ai.png";
  a.click();
}

const TOKEN = "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";

async function generateImage() {
  const promptText = document.getElementById("prompt").value.trim();
  if (!promptText) { alert("من فضلك اكتب وصف الصورة!"); return; }

  const btn = document.getElementById("btn");
  const status = document.getElementById("status");
  const loading = document.getElementById("loading");
  const resultCard = document.getElementById("resultCard");
  const resultImg = document.getElementById("resultImg");

  btn.disabled = true;
  btn.textContent = "⏳ جاري التوليد...";
  status.textContent = "";
  loading.style.display = "block";
  resultCard.style.display = "none";

  const fullPrompt = promptText + styleExtra;

  try {
    const response = await fetch(
      "https://api-inference.huggingface.co/models/black-forest-labs/FLUX.1-dev",
      {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${TOKEN}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          inputs: fullPrompt,
          options: { wait_for_model: true }
        })
      }
    );

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error || "خطأ");
    }

    const blob = await response.blob();
    if (blob.size < 1000) throw new Error("صورة فاضية");

    currentBlob = blob;
    const url = URL.createObjectURL(blob);
    resultImg.src = url;
    resultCard.style.display = "block";
    status.textContent = "✅ تم توليد الصورة بنجاح!";

  } catch (e) {
    status.textContent = "⚠️ حاول مرة أخرى بعد دقيقة!";
  }

  loading.style.display = "none";
  btn.disabled = false;
  btn.textContent = "🎨 ولّد الصورة الآن";
}
</script>
</body>
</html>
